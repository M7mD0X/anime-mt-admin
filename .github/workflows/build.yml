name: Build Admin APK

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Bump version
        id: version
        run: |
          CURRENT=$(cat admin_version.txt)
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)

          if [ "${{ github.event.inputs.bump_type }}" = "major" ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "${{ github.event.inputs.bump_type }}" = "minor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))

          echo $NEW_VERSION > admin_version.txt
          echo "VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV

      - name: Save new version to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add admin_version.txt
          git commit -m "chore: bump admin version to ${{ env.VERSION }}"
          git push

      - name: Build project
        run: |
          flutter create temp_app --project-name anime_mt_admin --org com.animemt

          # Fix applicationId
          sed -i 's/com.example.anime_mt_admin/com.animemt.anime_mt_admin/' temp_app/android/app/build.gradle

          # Set version
          sed -i "s/versionCode 1/versionCode ${{ env.VERSION_CODE }}/" temp_app/android/app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"${{ env.VERSION }}\"/" temp_app/android/app/build.gradle

          # Fix AndroidManifest
          sed -i 's/<manifest xmlns:android="http:\/\/schemas.android.com\/apk\/res\/android">/<manifest xmlns:android="http:\/\/schemas.android.com\/apk\/res\/android">\n    <uses-permission android:name="android.permission.INTERNET"\/>/' temp_app/android/app/src/main/AndroidManifest.xml
          sed -i 's/android:label="anime_mt_admin"/android:label="Anime MT Admin"/' temp_app/android/app/src/main/AndroidManifest.xml

          # Copy source files
          mkdir -p temp_app/lib/screens
          cp lib/main.dart temp_app/lib/main.dart
          cp lib/screens/login_screen.dart temp_app/lib/screens/login_screen.dart
          cp lib/screens/dashboard_screen.dart temp_app/lib/screens/dashboard_screen.dart
          cp lib/screens/add_anime_screen.dart temp_app/lib/screens/add_anime_screen.dart
          cp lib/screens/anime_list_screen.dart temp_app/lib/screens/anime_list_screen.dart
          cp lib/screens/add_episode_screen.dart temp_app/lib/screens/add_episode_screen.dart
          cp pubspec.yaml temp_app/pubspec.yaml
          cp icon.png temp_app/icon.png

          cd temp_app
          flutter pub get
          dart run flutter_launcher_icons
          flutter build apk --release
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/AnimeMT-Admin.apk

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: admin-v${{ env.VERSION }}
          name: "Anime MT Admin v${{ env.VERSION }}"
          body: "Version ${{ env.VERSION }}"
          files: temp_app/build/app/outputs/flutter-apk/AnimeMT-Admin.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}