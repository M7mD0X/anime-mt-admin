name: Build Admin APK

on:
  workflow_dispatch:
    inputs:
      version_note:
        description: 'What is new in this version?'
        required: false
        default: 'New update'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Build project
        run: |
          flutter create temp_app --project-name anime_mt_admin --org com.animemt
          mkdir -p temp_app/lib/screens
          cp lib/main.dart temp_app/lib/main.dart
          cp lib/screens/login_screen.dart temp_app/lib/screens/login_screen.dart
          cp lib/screens/dashboard_screen.dart temp_app/lib/screens/dashboard_screen.dart
          cp lib/screens/add_anime_screen.dart temp_app/lib/screens/add_anime_screen.dart
          cp lib/screens/anime_list_screen.dart temp_app/lib/screens/anime_list_screen.dart
          cp lib/screens/add_episode_screen.dart temp_app/lib/screens/add_episode_screen.dart
          cp pubspec.yaml temp_app/pubspec.yaml
          cp icon.png temp_app/icon.png
          sed -i 's/<manifest xmlns:android="http:\/\/schemas.android.com\/apk\/res\/android">/<manifest xmlns:android="http:\/\/schemas.android.com\/apk\/res\/android">\n    <uses-permission android:name="android.permission.INTERNET"\/>/' temp_app/android/app/src/main/AndroidManifest.xml
          sed -i 's/android:label="anime_mt_admin"/android:label="Anime MT Admin"/' temp_app/android/app/src/main/AndroidManifest.xml
          cd temp_app
          flutter pub get
          dart run flutter_launcher_icons
          flutter build apk --release
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/AnimeMT-Admin.apk

      - name: Set version
        run: echo "VERSION=1.0.${{ github.run_number }}" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ env.VERSION }}
          name: "Anime MT Admin v${{ env.VERSION }}"
          body: "${{ github.event.inputs.version_note }}"
          files: temp_app/build/app/outputs/flutter-apk/AnimeMT-Admin.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}